        <h2>Child Care Financial Assistance</h2>
        <p>Most San Francisco families now qualify for free or reduced-cost child care through the Early Learning For All (ELFA) program.</p>
        <ul>
          <li><strong>Free child care:</strong> Families earning up to 110% Area Median Income (~$171,450/year for a family of four)</li>
          <li><strong>100% tuition credit:</strong> Families earning 111-150% AMI (~$233,800/year for a family of four)</li>
          <li><strong>50% discount:</strong> Starting July 2026, families earning 151-200% AMI (~$311,700/year for a family of four)</li>
        </ul>
        <h2>How to Apply</h2>
        <p>Contact a Resource &amp; Referral Agency:</p>
        <ul>
          <li>Children's Council of San Francisco: (415) 343-3300 | childcaresf.org</li>

        </ul>
